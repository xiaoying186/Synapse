name: Synapse Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Public release version, for example 0.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version and tag
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}".Trim()
          if ($version -notmatch '^\d+\.\d+\.\d+([.-][0-9A-Za-z.-]+)?$') {
            throw "Invalid version '$version'. Use a SemVer-like value such as 0.0.1."
          }

          $tag = "v$version"
          $existingTag = git ls-remote --tags origin "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            throw "Could not check whether tag $tag exists."
          }
          if ($existingTag) {
            throw "Tag $tag already exists. Refusing to overwrite an existing release tag."
          }

          "SYNAPSE_RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "SYNAPSE_RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Secret Guard scan
        run: npm.cmd run secret:scan

      - name: Static public baseline preflight
        run: npm.cmd run preflight:static

      - name: I18n key sync
        run: npm.cmd run i18n:check

      - name: Build frontend
        run: npm.cmd run build

      - name: Synchronize release version in workspace
        shell: pwsh
        run: |
          $version = $env:SYNAPSE_RELEASE_VERSION

          $packagePath = "package.json"
          $package = Get-Content $packagePath -Raw | ConvertFrom-Json
          $package.version = $version
          $package | ConvertTo-Json -Depth 100 | Set-Content $packagePath -Encoding UTF8

          $tauriPath = "src-tauri/tauri.conf.json"
          $tauri = Get-Content $tauriPath -Raw | ConvertFrom-Json
          $tauri.version = $version
          $tauri | ConvertTo-Json -Depth 100 | Set-Content $tauriPath -Encoding UTF8

          $cargoPath = "src-tauri/Cargo.toml"
          $cargo = Get-Content $cargoPath -Raw
          $cargo = $cargo -replace '(?m)^version\s*=\s*".*"$', "version = `"$version`""
          $cargo = $cargo -replace '(?m)^description\s*=\s*".*"$', "description = `"Synapse $version - Local-first public release aligned with internal Design V6.6`""
          Set-Content $cargoPath $cargo -Encoding UTF8

      - name: Build Tauri installer
        run: npm.cmd run tauri:build

      - name: Sign Windows installers
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
          WINDOWS_SIGNING_TIMESTAMP_URL: ${{ vars.WINDOWS_SIGNING_TIMESTAMP_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERT_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERT_PASSWORD)) {
            throw "Windows signing secrets are required: WINDOWS_SIGNING_CERT_BASE64 and WINDOWS_SIGNING_CERT_PASSWORD."
          }

          $bundleRoot = "src-tauri/target/release/bundle"
          if (!(Test-Path $bundleRoot)) {
            throw "Tauri bundle directory was not found: $bundleRoot"
          }

          $installers = Get-ChildItem $bundleRoot -Recurse -File |
            Where-Object {
              $_.Extension -in @(".msi", ".exe") -or
              $_.FullName -match "\\nsis\\"
            } |
            Sort-Object FullName

          if ($installers.Count -eq 0) {
            throw "No Windows installer artifacts were found under $bundleRoot."
          }

          $certPath = Join-Path $env:RUNNER_TEMP "synapse-windows-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_BASE64))
          $password = ConvertTo-SecureString $env:WINDOWS_SIGNING_CERT_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          if (-not $cert.Thumbprint) {
            throw "Windows signing certificate import did not return a certificate thumbprint."
          }

          $signToolCommand = Get-Command signtool.exe -ErrorAction SilentlyContinue
          $signTool = if ($signToolCommand) { $signToolCommand.Source } else { $null }
          if (-not $signTool) {
            $kitRoot = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
            $signTool = Get-ChildItem $kitRoot -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $signTool) {
            throw "signtool.exe was not found on the Windows runner."
          }

          $timestampUrl = $env:WINDOWS_SIGNING_TIMESTAMP_URL
          if ([string]::IsNullOrWhiteSpace($timestampUrl)) {
            $timestampUrl = "http://timestamp.digicert.com"
          }

          foreach ($installer in $installers) {
            & $signTool sign /fd SHA256 /td SHA256 /tr $timestampUrl /sha1 $cert.Thumbprint /v $installer.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "signtool failed while signing $($installer.FullName)."
            }
            & $signTool verify /pa /v $installer.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "signtool verification failed for $($installer.FullName)."
            }
          }

      - name: Collect installers and SHA-256 files
        id: artifacts
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/release/bundle"
          if (!(Test-Path $bundleRoot)) {
            throw "Tauri bundle directory was not found: $bundleRoot"
          }

          $installers = Get-ChildItem $bundleRoot -Recurse -File |
            Where-Object {
              $_.Extension -in @(".msi", ".exe") -or
              $_.FullName -match "\\nsis\\"
            } |
            Sort-Object FullName

          if ($installers.Count -eq 0) {
            throw "No Windows installer artifacts were found under $bundleRoot."
          }

          $uploadArgs = @()
          foreach ($installer in $installers) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $installer.FullName).Hash.ToLowerInvariant()
            $shaPath = "$($installer.FullName).sha256"
            "$hash  $($installer.Name)" | Set-Content -LiteralPath $shaPath -Encoding ascii
            $uploadArgs += $installer.FullName
            $uploadArgs += $shaPath
          }

          $uploadFile = Join-Path $env:RUNNER_TEMP "release-upload-files.txt"
          $uploadArgs | Set-Content -LiteralPath $uploadFile -Encoding utf8
          "upload_file=$uploadFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create release notes
        shell: pwsh
        run: |
          node scripts/release-notes.mjs $env:SYNAPSE_RELEASE_VERSION "$env:RUNNER_TEMP/release-notes.md"

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $uploadFiles = Get-Content -LiteralPath "${{ steps.artifacts.outputs.upload_file }}"
          gh release create $env:SYNAPSE_RELEASE_TAG `
            --title "Synapse v$env:SYNAPSE_RELEASE_VERSION" `
            --notes-file "$env:RUNNER_TEMP/release-notes.md" `
            --target "$env:GITHUB_SHA" `
            @uploadFiles
