name: Feature request
description: Suggest a guarded public-baseline feature.
title: "[Feature]: "
labels: ["type: feature", "status: needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep requests aligned with the 0.0.0 public baseline. Do not include private workflows, commercial plans, credentials, or unpublished internal design material.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Synapse do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Taiheng / governance
        - Zhishu / intelligence hub
        - Xingtai / action desk
        - Baigong / arsenal
        - Documentation
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary check
      options:
        - label: This does not require default-enabled external delivery.
        - label: This does not require unrestricted Agent execution.
        - label: This does not require browser write automation.
        - label: This does not require automatic durable L2 writes.
        - label: This does not require committing secrets or private local data.
