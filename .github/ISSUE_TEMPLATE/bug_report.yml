name: Bug report
description: Report a reproducible Synapse issue.
title: "[Bug]: "
labels: ["type: bug", "status: needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, local credentials, webhook URLs, private documents, or sensitive local paths.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest steps needed to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Taiheng / governance
        - Zhishu / intelligence hub
        - Xingtai / action desk
        - Baigong / arsenal
        - Build / release
        - Documentation
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Include relevant command output, with secrets removed.
